  description:
    value: >-
      <p>You incorporate necromantically-enhanced bone into your armor. As part
      of casting this spell, you transform one suit of medium or heavy armor
      that you are wearing into bonecraft armor. The armor maintains its
      existing statistics, but is no longer considered to be made of metal,
      cannot rust or be targeted by the heat metal spell, and cannot be removed
      from your person against your will. </p><p>You can have only one suit of
      bonecraft armor at a time. If you cast this spell on another suit of
      armor, the previous suit loses this spell's benefits.</p>
