  description:
    value: >-
      <p>You summon bone matter from nearby corpses to form a barrier around
      you, protecting you from harm. For the duration of the spell, Bludgeoning,
      Piercing and Slashing damage that you take is reduced by an amount equal
      to the spell slot level used to cast the spell; plus an additional 1 for
      each dead creature that is Small or larger within 60 feet of you when you
      cast this spell, up to a maximum bonus equal to your spellcasting ability
      modifier. The corpses used to form the barrier are destroyed and cannot be
      used for further castings of this spell.</p><p> At Higher Levels. When you
      cast this spell using a spell slot of 2nd level, the duration is 10
      minutes. When you cast this spell using a spell slot of 3rd level, the
      duration is 1 hour. When you cast this spell using a spell slot of 4th
      level, the duration is 8 hours. When you cast this spell using a spell
      slot of 5th level or higher, the duration is 24 hours.</p>
    chat: ''
