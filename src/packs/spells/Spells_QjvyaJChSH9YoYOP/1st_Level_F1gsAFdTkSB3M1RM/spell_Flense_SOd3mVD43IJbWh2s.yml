  description:
    value: >-
      <p>This spell, developed in Odakyr, was created to aid in the creation of
      undead by magically stripping the flesh, muscle, and organs from a corpse,
      leaving pristine bones. You point at a creature or corpse within range.
      When used on a corpse, the flesh, muscle and organs are stripped away,
      leaving a skeleton. When used against a creature, that creature must make
      a Constitution saving throw. On a failed save, the target takes 2d10
      Necrotic damage and can’t take reactions until the end of its next turn.
      On a successful save, the target takes half as much damage, and suffers no
      other effect. If this damage kills the target, they are reduced to just
      their skeleton. </p><p><strong>At Higher Levels.</strong> When you cast
      this spell using a spell slot of 2nd level or higher, the initial damage
      increases by 1d10 for each slot level above 1st.</p>
