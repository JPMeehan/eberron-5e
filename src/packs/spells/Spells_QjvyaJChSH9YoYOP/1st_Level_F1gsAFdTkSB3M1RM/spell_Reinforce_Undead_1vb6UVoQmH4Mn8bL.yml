  description:
    value: >-
      <p>You touch an Undead creature that is under your control and magically
      thicken its flesh and bones, or summon vines, roots and other plant matter
      to reinforce its body. For the duration, the creature gains a +2 bonus to
      AC and Strength, Dexterity, and Constitution saving throws, and if it has
      a vulnerability to bludgeoning, piercing, or slashing damage, it loses
      that vulnerability.</p>
