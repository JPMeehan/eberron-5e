system:
  description:
    value: >-
      <p>As a reaction to taking damage from an attack by a creature you can
      see, you can curse the creature with a vow of vengeance. Your next attack
      against the creature has advantage and deals an additional 1d4 psychic
      damage on a hit. If you wait at least 24 hours before making an attack
      against the creature, the attack deals an additional 3d4 psychic damage
      instead. A remove curse spell ends this effect.</p>
