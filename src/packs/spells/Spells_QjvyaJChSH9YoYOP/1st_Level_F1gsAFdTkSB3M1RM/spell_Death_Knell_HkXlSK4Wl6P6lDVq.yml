  description:
    value: >-
      <p>Every death is a tragedy, but it reinforces the importance of finding
      the divinity within. You draw upon the last breath of divinity a person
      releases as they die. You gain 2d4 temporary hit points, and have
      advantage on the next attack roll, ability check, or saving throw you make
      before the end of your next turn.</p><p>At Higher Levels. When you cast
      this spell using a spell slot of 2nd level or higher, the temporary hit
      points increase by 2d4 for each slot level above 1st.</p>
