system:
  description:
    value: >-
      <p>You establish a psychic connection with one willing beast or
      monstrosity you touch. For the duration of this spell, you can see through
      its eyes and hear through its ears, and gain access to any special senses
      the creature has, but cannot read its thoughts or control its movement or
      actions. You can switch between the creature’s senses and your own as an
      action.</p>
