img: icons/magic/nature/wolf-paw-glow-large-orange.webp
system:
  description:
    value: >-
      <p>When you cast this spell, if you are not a fiend you take [[/damage
      4d12 psychic]] damage that cannot be mitigated in any way. </p><p>One
      creature within range must succeed on a Charisma saving throw or become
      cursed. On a failed save, the curse has no immediate effect, and the
      target doesn’t realize it failed its saving throw. Every time the cursed
      target takes a long rest, however, it awakens for a period of 2 hours
      during its rest with a chaotic evil alignment and a savage, bloodthirsty
      personality. While in this state, the cursed target will attempt to
      slaughter anyone that riles their anger—and in this state, even the most
      innocent action could ignite hostility in the cursed creature. </p><p>When
      this savage state expires after 2 hours, the target goes unconscious for
      the remainder of their long rest, and awakens at the end of it with no
      memory of any action it took while in its savage state. </p><p>The cursed
      target gains no benefit from taking long rests while cursed. If the target
      reaches 6 levels of exhaustion while cursed, it doesn’t die. Instead, the
      target falls into a deep slumber for 24 hours. When it awakens, the target
      is no longer cursed and its personality changes to the savage,
      bloodthirsty state permanently. Once a target’s personality has been
      changed this way, its original personality can only be restored with a
      wish spell or similar magic.</p>
