  description:
    value: >-
      <p>You create a wall of amorphous flesh on a solid surface within range.
      You can make the wall up to 60 feet long, 20 feet high, and 3 feet thick.
      When the wall appears, each creature within its area must make a Dexterity
      saving throw. On a failed save, a creature takes 5d8 Bludgeoning damage,
      or half as much damage on a successful save. Regardless of the result of
      the save, the creature is pushed to one side of the wall (your
      choice).</p><p>The wall is covered with eyes, mouths filled with
      human-like teeth, and grasping limbs. Any creature that starts its turn
      within 5 feet of the wall must succeed on a Dexterity saving throw or be
      &amp;Reference[restrained] by the grasping limbs.</p><p>A creature that
      ends its turn restrained by the wall takes [[/damage 5d8 piercing]] damage
      as the many mouths bite into them. A creature Restrained by the wall can
      use its action to make a Strength or Dexterity check (its choice) against
      your spell save DC. On a success, it frees itself.</p><p>The wall is made
      of living tissue that can be damaged and thus breached, and also healed.
      Each 10-foot segment of wall has AC 10 and 50 hit points. Reducing a
      segment to 0 hp destroys it. These segments can regain hit points by
      targeting them with spells and abilities that restore hit points, such as
      cure wounds. Potions can also be administered to the mouths of the wall,
      allowing damaged segments to be healed that way.</p>
