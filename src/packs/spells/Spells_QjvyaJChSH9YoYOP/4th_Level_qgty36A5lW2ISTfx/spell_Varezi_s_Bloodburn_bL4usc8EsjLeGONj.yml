  description:
    value: >-
      <p>You target a creature within range and necromantically heat their
      blood. The target must make a Constitution saving throw. On a failed save,
      the target takes 6d10 Fire damage, and their blood begins to boil for the
      duration. On a successful save, a creature takes half as much damage and
      their blood does not boil. </p><p>A creature with boiling blood must make
      a Constitution saving throw at the beginning of each of their turns,
      ending this effect on themselves on a success. On a failed save, the
      creature takes 3d10 fire damage and gains a level of exhaustion, which
      lasts until the spell effect ends. A creature without blood is unaffected
      by this spell. </p><p><strong>At Higher Levels.</strong> When you cast
      this spell using a spell slot of 5th level or higher, the initial fire
      damage and the damage dealt by boiling blood increase by 1d10.</p>
