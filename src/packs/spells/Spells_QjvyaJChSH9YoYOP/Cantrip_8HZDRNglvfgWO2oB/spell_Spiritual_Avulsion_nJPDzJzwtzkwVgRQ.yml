  description:
    value: >-
      <p>You gesture to a creature within range and tear at its essence, soul,
      or animating energy, siphoning it into yourself. The target must succeed
      on a Charisma saving throw or take 1d6 Necrotic damage. You gain temporary
      hit points equal to half the damage dealt.</p><p> This spell’s damage
      increases by one die when you reach 5th level (2d6), 11th level (3d6) and
      17th level (4d6).</p>
