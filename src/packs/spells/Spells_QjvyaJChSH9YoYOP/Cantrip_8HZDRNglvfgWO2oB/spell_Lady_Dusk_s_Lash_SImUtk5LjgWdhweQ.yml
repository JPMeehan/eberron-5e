  description:
    value: >-
      <p>You draw your own blood out of a wound and use it like a whip, lashing
      out at a target within range. Make a melee spell attack against a target
      within range. If the attack hits, the target takes 1d8 Necrotic damage,
      and if the target is Large or smaller, it is knocked
      &amp;Reference[prone]. </p><p>This spell’s damage increases by one die
