  description:
    value: >-
      <p>You reach out a hand and seize control of a target’s skeleton within
      range, painfully vibrating their bones and moving them against their will
      like a macabre marionette. The target must make a Constitution saving
      throw. On a failed save, the target takes 3d10 Bludgeoning damage and you
      can choose to move them up to 10 feet in any direction. On a successful
      save, the target takes half as much damage and is not moved.
      </p><p>Creatures without bones, such as incorporeal Undead, Elementals, or
      Constructs, are unaffected by this spell. </p><p><strong>At Higher
      Levels.</strong> When you cast this spell using a spell slot of 3rd level
      or higher, the damage increases by 1d10 for each slot level above 2nd.</p>
