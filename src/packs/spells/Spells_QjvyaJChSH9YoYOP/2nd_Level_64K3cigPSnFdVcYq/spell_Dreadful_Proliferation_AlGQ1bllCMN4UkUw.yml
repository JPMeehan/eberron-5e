  description:
    value: >-
      <p>You target a corpse of a living creature within range and rapidly
      cultivate a flesh-eating fungus in it. The fungus immediately flowers out
      of the corpse and releases caustic spores within a 15- foot radius sphere.
      Creatures in that area mustmake a Constitution saving throw. On a failed
      save, a creature takes 4d6 necrotic damage, or half as much damage on a
      successful save. </p><p>If a creature is reduced to 0 hit points by this
      spell, they die and proliferate the fungus, causing another sporing from
      their corpse on their initiative count next round. </p><p><strong>At
      Higher Levels.</strong> When you cast this spell using a spell slot of 3rd
      level or higher, the damage increases by 1d6 for each slot level above
      2nd.</p>
