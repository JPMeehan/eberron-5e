  description:
    value: >-
      <p>You vomit up a torrent of blood, which quickly forms into a swarm of
      bloody, ravenous vermin which swarm over everything in a 30-foot cone in
      front of you. Each creature in that area must make a Dexterity saving
      throw. On a failed save, a creature takes 2d8 Piercing damage and is
      &amp;Reference[frightened] of you until the end of your next turn. On a
      successful save, a creature takes half as much damage and is not
      frightened.</p><p><strong>At Higher Levels.</strong> When you cast this
      spell using a spell slot of 3rd level or higher, the damage increases by
      1d8 for each slot level above 2nd.</p>
