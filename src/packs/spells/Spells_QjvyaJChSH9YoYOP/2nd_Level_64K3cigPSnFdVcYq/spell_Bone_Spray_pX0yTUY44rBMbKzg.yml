  description:
    value: >-
      <p>You fire a torrent of jagged bone from your body in a 15-foot cone.
      Each creature in that area must make a Dexterity saving throw. On a failed
      save, a creature takes 2d10 Piercing damage immediately and 1d10 Slashing
      damage at the start of their next turn as the embedded bone shards
      violently rupture. On a successful save, a creature takes half of the
      initial damage and no damage at the start of their next turn.</p><p>At
      Higher Levels. When you cast this spell using a spell slot of 3rd level or
      higher, the initial damage increases by 1d10 for each slot level above
      2nd, and the delayed damage increases by 1d10 for every two slot levels
      above 2nd.</p>
