  description:
    value: >-
      <p>You point at the creature that triggered this reaction, reanimating the
      body and trapping the soul in it temporarily. The target is returned to
      life for the duration of the spell, its creature type becomes Undead, and
      it gains temporary hit points equal to half its hit point maximum. It
      cannot regain hit points in any way, and if it loses these temporary hit
      points, it dies. When the spell ends, the target dies.</p>
