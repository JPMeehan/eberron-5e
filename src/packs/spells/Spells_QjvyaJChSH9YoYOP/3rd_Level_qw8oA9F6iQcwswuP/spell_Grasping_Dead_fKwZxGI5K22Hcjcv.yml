  description:
    value: >-
      <p>Hundreds of skeletal hands erupt from the ground, clawing at and
      attempting to restrain creatures in a 20-foot square starting from a point
      within range. For the duration, these skeletal hands turn the area into
      difficult terrain.</p><p>When a creature enters the affected area for the
      first time on a turn or starts its turn there, the creature must succeed
      on a Strength saving throw or take 2d8 Slashing damage and be
      &amp;Reference[Restrained] by the skeletal hands until the spell ends. A
      creature that starts its turn in the area and is already restrained by the
      hands takes 2d8 Slashing damage. A creature Restrained by the hands can
      use its action to make a Strength or Dexterity check (its choice) against
      your spell save DC. On a success, it frees itself.</p><p>On each of your
      turns after you cast this spell, you can use an action to move the hands
      and anything Restrained by them up to 30 feet in any direction, as long as
      the area remains in contact with the ground.</p>
