  description:
    value: >-
      <p>You call forth a blighted nature spirit. It manifests in an unoccupied
      space that you can see within range. This corporeal form uses the Blighted
      Spirit stat block. When you cast the spell, choose the creature's form:
      Needle, Twig or Vine. The spirit resembles a humanoid plant creature with
      the chosen form, which determines certain traits in its stat block. The
      creature disappears when it drops to 0 hit points or when the spell ends.
      </p><p>The creature is an ally to you and your companions. In combat, the
      creature shares your initiative count, but it takes its turn immediately
      after yours. It obeys your verbal commands (no action required by you). If
      you don't issue any, it takes the Dodge action and uses its move to avoid
      danger. </p><p><strong>At Higher Levels.</strong> When you cast this spell
      using a spell slot of 4th level or higher, use the higher level wherever
      the spell's level appears in the stat block.</p>
