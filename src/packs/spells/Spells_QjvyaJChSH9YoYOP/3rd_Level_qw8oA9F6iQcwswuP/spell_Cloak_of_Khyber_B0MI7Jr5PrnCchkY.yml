name: Cloak of Khyber
type: spell
_id: B0MI7Jr5PrnCchkY
img: icons/magic/perception/shadow-stealth-eyes-purple.webp
system:
  description:
    value: >-
      <p>When you cast this spell, if you are not a fiend you take 3d12 psychic
      damage that cannot be mitigated in any way. </p><p>For the duration of
      this spell, your alignment and creature type cannot be determined by any
      magic or effect. Additionally, if you assume a different form through a
      transformation, transmutation, or illusion effect—and you stay in the same
      form for at least 1 hour—that form is detected by truesight as though it
      were your true form. </p><p>If the Khyber dragonshard used as the material
      component for this spell is ever more than 1 foot away from your body, the
      spell ends and you revert to your actual true form.</p>
