  description:
    value: >-
      <p>Choose an Undead that you can see within range. The target must succeed
      on a Wisdom saving throw or be Paralyzed for the duration. At the end of
      each of its turns, the target can make another Wisdom saving throw. On a
      success, the spell ends on the target.</p><p><strong>At Higher
      Levels.</strong> When you cast this spell using a spell slot of 4th level
      or higher, you can target one additional Undead for each slot level above
      3rd. The Undead must be within 30 feet of each other when you target
      them.</p>
