system:
  description:
    value: >-
      <p>When you cast this spell, if you are not a fiend you take [[/damage
      3d12 necrotic]] damage that cannot be mitigated in any way. You must
      consume the flesh or brain of a creature that is not a construct or
      elemental to cast this spell. When you do, you gain one of the following
      effects until the spell ends. </p><p><strong>Consumed Might.</strong> You
      have advantage on Strength checks and your carrying capacity doubles.
      </p><p><strong>Consumed Grace.</strong> You have advantage on Dexterity
      checks and you don’t take damage from falling 20 feet or less while you
      aren’t incapacitated. </p><p><strong>Consumed Fortitude.</strong> You have
      advantage on Constitution checks and you gain 2d6 temporary hit points,
      which are lost when the spell ends. </p><p><strong>Consumed
      Cunning.</strong> You have advantage on Intelligence checks.
      </p><p><strong>Consumed Insight.</strong> You have advantage on Wisdom
      checks. </p><p><strong>Consumed Splendor.</strong> You have advantage on
      Charisma checks. </p><p><strong>At Higher Levels.</strong> When you cast
      this spell using a slot of 4th level or higher, you can choose to gain one
      additional effect for every two slot levels above 3rd. If you gain three
      or more effects, the spell’s duration comes permanent, until
      dispelled.</p>
