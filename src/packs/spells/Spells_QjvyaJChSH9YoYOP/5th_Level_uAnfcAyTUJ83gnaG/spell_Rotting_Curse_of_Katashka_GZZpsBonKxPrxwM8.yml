system:
  description:
    value: >-
      <p>When you cast this spell, if you are not a fiend you take [[/damage
      5d12 necrotic]] damage that cannot be mitigated in any way.</p><p>You
      touch a creature, and that creature must succeed on a Charisma saving
      throw or become cursed. The cursed target’s hit point maximum is
      immediately reduced by [[/damage 6d6]], and is reduced by an additional
      [[/damage 1d6]] every hour until its hit point maximum is reduced to 0 or
      until the curse is removed. If the target’s hit point maximum is reduced
      to 0, it instantly dies.</p>
