system:
  description:
    value: >-
      <p>You reach into Khyber to conjure a minion of the Sundered Heart in an
      unoccupied space that you can see within range. It uses the Sorrowsworn
      Spirit statblock. When you cast the spell, choose Angry, Lonely, or Lost.
      Your choice determines some of the traits in its stat block. </p><p>The
      creature disappears when it drops to 0 hit points or when the spell ends.
      The creature is an ally to you and your companions. In combat, the
      creature shares your initiative count, but it takes its turn immediately
      after yours. It obeys your verbal commands (no action required by you). If
      you don't issue any, it takes the Dodge action and uses its move to avoid
      danger. </p><p><em>At Higher Levels:</em> When you cast this spell using a
      spell slot of 6th level or higher, use the higher level wherever the
      spell's level appears in the stat block.</p>
