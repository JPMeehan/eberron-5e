  description:
    value: >-
      <p>Blood calls to blood. With a word and a flick of your wrist you slit
      your palm and cause streams of blood to erupt from the mouths, nostrils,
      ears, and other facial openings of all creatures in a 30- foot cone in
      front of you, which comes rushing into the wound on your palm. Each
      creature in the area must make a Constitution saving throw. A target takes
      8d6 Necrotic damage on a failed save, or half as much damage on a
      successful save.</p><p>Additionally, you gain temporary hit points equal
      to the damage taken by one target. Creatures without blood, such as
      incorporeal undead, constructs, or elementals, are unaffected by this
      spell. </p><p><strong>At Higher Levels.</strong> When you cast this spell
      using a spell slot of 6th level or higher, the damage increases by 1d6 for
      each slot level above 5th.</p>
