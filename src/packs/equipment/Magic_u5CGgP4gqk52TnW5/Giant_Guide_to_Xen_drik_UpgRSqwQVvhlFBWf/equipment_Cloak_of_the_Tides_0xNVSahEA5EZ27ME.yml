  description:
    value: >-
      <p>A Cloak of the Tides appears as a white half-cape with a clasp inset
      with a Khyber dragonshard. When worn, rivulets of water flow endlessly
      over the surface of the cape, forming the shape of shifting giant runes.
      This water maintains its patterning despite gravity, and does not wet the
      wearer in any way. While wearing this item, you are immune to the effects
      of extreme heat, and can walk on water as though it were solid ground.
      Additionally, when you take fire damage from a spell, ability, or attack,
      you can use your reaction to grant resistance to that triggering damage to
      you and every character within 10 feet of you who also take damage from
      the same source.</p>
