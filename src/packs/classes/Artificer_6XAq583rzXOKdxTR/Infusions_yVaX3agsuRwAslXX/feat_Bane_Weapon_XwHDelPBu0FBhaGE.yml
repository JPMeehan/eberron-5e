  description:
    value: >-
      <p><em>Item: A simple or martial melee weapon (requires
      attunement)</em></p><p>This magic weapon grants a +1 bonus to attack and
      damage rolls made with it.</p><p>When you infuse this item, choose one of
      the following creature types: aberration, beast, celestial, dragon, fiend,
      giant, or undead. The weapon has 4 charges. When the wielder hits a
      creature of this type with the weapon, they can expend 1 charge and
      inflict an additional 2d6 damage of the weapon’s type with the attack. The
      weapon regains 1d4 charges daily at dawn.</p>
