  description:
    value: >-
      <p><em>Item: A suit of armor (requires attunement)</em></p><p>A creature
      gains a +1 bonus to Armor Class while wearing this armor.</p><p>The armor
      has 4 charges. As a reaction when the wearer suffers a critical hit, they
      can expend 1 charge and count that hit as a normal hit instead. Any
      effects triggered by the critical hit are negated. The armor regains 1d4
      expended charges daily at dawn.</p>
