name: Persuasive Push
type: feat
system:
  description:
    value: >-
      <p>At 14th level, you've learned the secrets to how minds work and, more
      importantly, how to manipulate them. As an action, you can cast the
      @UUID[Compendium.dnd5e.spells24.Item.phbsplSuggestion]{suggestion} spell
      with no components other than speaking aloud the suggested course of
      activity. When you cast the spell in this manner, it does not require
      concentration.</p><p>You can use this feature a number of times equal to
      your Charisma modifier (a minimum of once). You regain all expended uses
      when you finish a long rest.</p>
